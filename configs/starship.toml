# Starship Prompt Configuration
# https://starship.rs/config/

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$golang\
$nodejs\
$python\
$rust\
$kubernetes\
$aws\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[username]
show_always = false
style_user = "bold blue"
format = "[$user]($style) "

[hostname]
ssh_only = true
format = "[@$hostname](bold yellow) "

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version)]($style) "

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version)]($style) "
detect_extensions = ["js", "ts", "mjs", "cjs"]

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol($version)]($style) "

[rust]
symbol = "🦀 "
style = "bold red"
format = "[$symbol($version)]($style) "

[kubernetes]
disabled = false
symbol = "☸ "
style = "bold blue"
format = "[$symbol$context(/$namespace)]($style) "

[aws]
symbol = "☁️  "
style = "bold orange"
format = "[$symbol($profile)(\\($region\\))]($style) "

[docker_context]
symbol = "🐳 "
style = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[⏱ $duration]($style) "
